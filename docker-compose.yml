services:
  api:
    build:
      context: ./backend
    ports:
      - "7190:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080 # <--- CRITICAL: Tells .NET to listen on port 8080

  web:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api
